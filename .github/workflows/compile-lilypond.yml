name: Compile LilyPond scores

on:
  push:
    paths:
      - '**.ly'
      - '.github/workflows/**'
      - '**.py'
      - 'requirements.txt'
  pull_request:
    paths:
      - '**.ly'
      - '.github/workflows/**'
      - '**.py'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Avoid warnings about missing DISPLAY variable when running fluidsynth
      DISPLAY: ":99"
      # Set a fixed locale to avoid issues with non-ASCII characters in LilyPond files
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
      LANGUAGE: "C.UTF-8"
      # Prevent warnings about JavaScript actions when using Node 24 in GitHub Actions (June 2026 update)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install LilyPond, fluidsynth and lame
        run: |
          sudo apt-get update
          sudo apt-get install -y lilypond fluidsynth fluid-soundfont-gm lame
          lilypond --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Compile all LilyPond scores (PDF + MIDI)
        run: |
          set -euo pipefail
          mkdir -p output

          compile_file() {
            local file="$1"
            local base
            base=$(basename "${file}" .ly)
            echo "Compiling ${base}..."

            lilypond -dcompile-diatonique  -o "output/${base}_diatonique" "${file}" || { echo "❌ Failed: ${base} (diatonique)";  return 1; }
            lilypond -dcompile-chromatique -o "output/${base}_chromatique" "${file}" || { echo "❌ Failed: ${base} (chromatique)"; return 1; }
            lilypond --formats=midi -dcompile-midi -o "output/${base}" "${file}"     || { echo "❌ Failed: ${base} (midi)";        return 1; }
          }
          export -f compile_file

          # Compile multiple files in parallel (depending on the number of CPU cores)
          find partitions -type f -name "*.ly" -print0 \
            | xargs -0 -P$(nproc) -I{} bash -c 'compile_file "$@"' _ {}

      - name: Generate MP3 files from MIDI
        run: |
          set -euo pipefail
          find output -type f -name "*.midi" -print0 | while IFS= read -r -d '' midi_file; do
            base=$(basename "${midi_file}" .midi)
            wav_file="output/${base}.wav"
            mp3_file="output/${base}.mp3"

            echo "Converting ${base}.midi → MP3..."
            fluidsynth -ni /usr/share/sounds/sf2/FluidR3_GM.sf2 "${midi_file}" -F "${wav_file}" -r 44100 \
              && lame --preset standard "${wav_file}" "${mp3_file}" \
              && rm "${wav_file}" \
              || { rm -f "${wav_file}"; echo "❌ Failed MP3 conversion for ${base}"; exit 1; }
          done

      - name: Generate index.html
        run: python generate_index.py

      - name: Merge PDF files
        run: python merge_pdf.py

      - name: Upload compiled files as artifact
        uses: actions/upload-artifact@v5
        with:
          name: lilypond-outputs
          path: output/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    env:
      # Set a fixed locale to avoid issues with non-ASCII characters in generated HTML
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
      LANGUAGE: "C.UTF-8"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: lilypond-outputs
          path: site

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
