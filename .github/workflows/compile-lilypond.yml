name: Compile LilyPond scores

on:
  push:
    paths:
      - '**.ly'
      - '.github/workflows/**'
      - '**.py'
      - 'requirements.txt'
  pull_request:
    paths:
      - '**.ly'
      - '.github/workflows/**'
      - '**.py'
      - 'requirements.txt'
  workflow_dispatch:

# Cancel in-progress runs when a new commit is pushed to the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Avoid warnings about missing DISPLAY variable when running fluidsynth
      DISPLAY: ":99"
      # Set a fixed locale to avoid issues with non-ASCII characters in LilyPond files
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
      LANGUAGE: "C.UTF-8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install LilyPond, fluidsynth and lame
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y lilypond fluidsynth fluid-soundfont-gm lame
          lilypond --version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install system dependencies for pycairo
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Compile all LilyPond scores (PDF + MIDI)
        run: |
          set -euo pipefail
          mkdir -p output

          # Toute ligne à partir d'un marqueur "% CI-IGNORE-BELOW" (et les lignes suivantes)
          # est retirée avant compilation, quel que soit son contenu (commenté ou non).
          # Cela protège contre un oubli de commentaire sur les lignes de test manuel
          # laissées en bas des fichiers .ly.
          strip_ci_ignored() {
            local file="$1"
            local dir tmp_file
            dir=$(dirname "${file}")
            tmp_file=$(mktemp -p "${dir}" "ci-tmp.XXXXXX")
            mv "${tmp_file}" "${tmp_file}.ly"
            tmp_file="${tmp_file}.ly"
            awk '/^%[[:space:]]*CI-IGNORE-BELOW/{exit} {print}' "${file}" > "${tmp_file}"
            echo "${tmp_file}"
          }
          export -f strip_ci_ignored

          compile_file() {
            local file="$1"
            local base tmp_file
            base=$(basename "${file}" .ly)
            echo "Compiling ${base}..."

            tmp_file=$(strip_ci_ignored "${file}")
            trap 'rm -f "${tmp_file}"' RETURN

            lilypond -dcompile-diatonique  -o "output/${base}_diatonique" "${tmp_file}" || { echo "❌ Failed: ${base} (diatonique)";  return 1; }
            lilypond -dcompile-chromatique -o "output/${base}_chromatique" "${tmp_file}" || { echo "❌ Failed: ${base} (chromatique)"; return 1; }
            lilypond --formats=midi -dcompile-midi -o "output/${base}" "${tmp_file}"     || { echo "❌ Failed: ${base} (midi)";        return 1; }
          }
          export -f compile_file

          # Compile partitions (all .ly files directly in partitions/)
          find partitions -maxdepth 1 -type f -name "*.ly" -print0 \
            | xargs -0 -P$(nproc) -I{} bash -c 'compile_file "$@"' _ {}

      - name: Compile gamme scores (PDF + MIDI)
        run: |
          set -euo pipefail
          mkdir -p output/gammes

          # Voir l'étape précédente pour le rôle du marqueur CI-IGNORE-BELOW.
          strip_ci_ignored() {
            local file="$1"
            local dir tmp_file
            dir=$(dirname "${file}")
            tmp_file=$(mktemp -p "${dir}" "ci-tmp.XXXXXX")
            mv "${tmp_file}" "${tmp_file}.ly"
            tmp_file="${tmp_file}.ly"
            awk '/^%[[:space:]]*CI-IGNORE-BELOW/{exit} {print}' "${file}" > "${tmp_file}"
            echo "${tmp_file}"
          }
          export -f strip_ci_ignored

          compile_gamme() {
            local file="$1"
            local base tmp_file
            base=$(basename "${file}" .ly)
            echo "Compiling gamme ${base}..."

            tmp_file=$(strip_ci_ignored "${file}")
            trap 'rm -f "${tmp_file}"' RETURN

            lilypond -dcompile-diatonique  -o "output/gammes/${base}_diatonique" "${tmp_file}" || { echo "❌ Failed: ${base} (diatonique)";  return 1; }
            lilypond -dcompile-chromatique -o "output/gammes/${base}_chromatique" "${tmp_file}" || { echo "❌ Failed: ${base} (chromatique)"; return 1; }
            lilypond --formats=midi -dcompile-midi -o "output/gammes/${base}" "${tmp_file}"    || { echo "❌ Failed: ${base} (midi)";        return 1; }
          }
          export -f compile_gamme

          find gammes -type f -name "*.ly" -print0 \
            | xargs -0 -P$(nproc) -I{} bash -c 'compile_gamme "$@"' _ {}

      - name: Generate MP3 files from MIDI
        run: |
          set -euo pipefail
          # Converts all .midi files found anywhere under output/ (including output/gammes/)
          find output -type f -name "*.midi" -print0 | while IFS= read -r -d '' midi_file; do
            dir=$(dirname "${midi_file}")
            base=$(basename "${midi_file}" .midi)
            wav_file="${dir}/${base}.wav"
            mp3_file="${dir}/${base}.mp3"

            echo "Converting ${base}.midi → MP3..."
            fluidsynth -ni /usr/share/sounds/sf2/FluidR3_GM.sf2 "${midi_file}" -F "${wav_file}" -r 44100 \
              && lame --preset standard "${wav_file}" "${mp3_file}" \
              && rm "${wav_file}" \
              || { rm -f "${wav_file}"; echo "❌ Failed MP3 conversion for ${base}"; exit 1; }
          done

      - name: Merge PDF files
        run: python merge_pdf.py

      - name: Generate index.html
        env:
          PRIVATE_PASSWORD: ${{ secrets.PRIVATE_PASSWORD }}
        run: python generate_index.py

      - name: Upload compiled files as artifact
        uses: actions/upload-artifact@v7
        with:
          name: lilypond-outputs
          path: output/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    env:
      # Set a fixed locale to avoid issues with non-ASCII characters in generated HTML
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
      LANGUAGE: "C.UTF-8"

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          name: lilypond-outputs
          path: site

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
